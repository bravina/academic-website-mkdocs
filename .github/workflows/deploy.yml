name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for git-revision-date-localized

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip  # cache pip dependencies

      - uses: actions/setup-node@v4
        with:
          node-version: '20'  # explicit version avoids outdated Node warnings

      - run: pip install -r requirements.txt

      - run: |
          mkdocs build
          echo "new.baptisteravina.com" > site/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4