site_name: Baptiste Ravina
site_url: https://www.baptisteravina.com
site_description: >-
  Senior Research Fellow at CERN, working on the ATLAS experiment.
  Particle physics, quantum entanglement, machine learning.
site_author: Baptiste Ravina

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Source Sans 3
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  icon:
    logo: material/atom-variant
    repo: fontawesome/brands/github

extra_css:
  - assets/css/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bravina
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/BaptisteRavina
    - icon: fontawesome/brands/orcid
      link: https://orcid.org/0000-0002-1622-6640
    - icon: fontawesome/solid/envelope
      link: mailto:baptiste.ravina@cern.ch

copyright: "&copy; 2026 Baptiste Ravina &middot; Built with MkDocs Material"

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - def_list

extra_javascript:
  - assets/js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - macros:
      module_name: main
  - blog:
      blog_dir: blog
      post_date_format: long
      archive: false
      categories_name: Categories
      categories_allowed:
        - ATLAS
        - Machine learning
        - Top physics
        - Quantum information

nav:
  - Home: index.md
  - Research: research.md
  - Publications: publications.md
  - Talks: talks.md
  - Team: team.md
  - Teaching: teaching.md
  - Outreach: outreach.md
  - Blog:
    - blog/index.md
