{% extends "main.html" %}

{% block tabs %}{{ super() }}{% endblock %}

{% block styles %}
{{ super() }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --hf: 'Source Serif 4', Georgia, serif;
  --bf: 'Source Sans 3', system-ui, sans-serif;
  --mf: 'JetBrains Mono', monospace;
  --teal-50: #e1f5ee; --teal-400: #1d9e75; --teal-600: #0f6e56; --teal-800: #085041; --teal-900: #04342c;
  --purple-50: #eeedfe; --purple-800: #3c3489;
  --coral-50: #faece7; --coral-800: #712b13;
  --blue-50: #e6f1fb; --blue-800: #0c447c;
  --s50: #f8f7f5; --s100: #efeee9; --s200: #dddcd6;
  --s400: #8a8a86; --s600: #5a5a58; --s800: #2a2a28; --s900: #1a1a18;
}
[data-md-color-scheme="slate"] {
  --s50: #1a1a18; --s100: #242422; --s200: #333330;
  --s400: #7a7a76; --s600: #a0a09a; --s800: #d8d8d0; --s900: #eeeee6;
}
.md-content__inner{max-width:none!important;padding:0!important;margin:0!important}
.hp *{box-sizing:border-box}.hp{font-family:var(--bf);color:var(--s900);line-height:1.6}.hp a{color:inherit}
.hp-hero{max-width:820px;margin:0 auto;padding:3rem 2rem 2rem}
.hp-hero-row{display:flex;gap:2rem;align-items:flex-start}
.hp-avatar{width:120px;height:120px;border-radius:50%;flex-shrink:0;object-fit:cover;border:3px solid var(--teal-50)}
.hp-avatar-placeholder{width:120px;height:120px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--teal-600),var(--purple-800));display:flex;align-items:center;justify-content:center;font-family:var(--hf);font-size:2.4rem;color:#fff}
.hp-hero h1{font-family:var(--hf);font-size:2.2rem;font-weight:700;line-height:1.15;letter-spacing:-.5px;margin-bottom:.3rem}
.hp-sub{font-size:1rem;color:var(--s600);margin-bottom:.6rem}
.hp-sub a{color:var(--teal-600);text-decoration:none;font-weight:500}
.hp-bio{font-size:.95rem;line-height:1.65;max-width:560px;color:var(--s800)}
.hp-bio em{font-style:normal;font-family:var(--hf);font-weight:600;background:var(--teal-50);color:var(--teal-900);padding:1px 6px;border-radius:4px}
.hp-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:.8rem}
.hp-pill{font-size:.75rem;padding:3px 12px;border-radius:6px;font-weight:500}
.hp-pill-t{background:var(--teal-50);color:var(--teal-900)}
.hp-pill-p{background:var(--purple-50);color:var(--purple-800)}
.hp-pill-c{background:var(--coral-50);color:var(--coral-800)}
.hp-pill-b{background:var(--blue-50);color:var(--blue-800)}
.hp-sec{max-width:820px;margin:0 auto;padding:2rem 2rem 0}
.hp-divider{border:none;border-top:1px solid var(--s200);margin:2.5rem 0 0}
.hp-ey{font-family:var(--mf);font-size:.68rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal-600);margin-bottom:.5rem}
.hp-sect{font-family:var(--hf);font-size:1.6rem;font-weight:600;letter-spacing:-.3px;margin-bottom:1rem;line-height:1.25}
.hp-feat{border-left:3px solid var(--teal-400);padding:1.25rem 1.5rem;background:var(--s50);margin:.75rem 0}
[data-md-color-scheme="slate"] .hp-feat,[data-md-color-scheme="slate"] .hp-blog-card{background:var(--s100)}
.hp-feat-lab{font-family:var(--mf);font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--teal-600);margin-bottom:.4rem}
.hp-feat h3{font-family:var(--hf);font-size:1.05rem;font-weight:600;margin-bottom:.15rem;line-height:1.3}
.hp-feat .hp-jnl{font-size:.82rem;color:var(--s400);margin-bottom:.3rem}
.hp-lnks{display:flex;gap:6px;flex-wrap:wrap;margin-top:.5rem}
.hp-lnks a{font-size:.72rem;font-weight:500;padding:3px 12px;border:1px solid var(--s200);border-radius:100px;text-decoration:none;color:var(--s600);transition:all .15s}
.hp-lnks a:hover{border-color:var(--teal-400);color:var(--teal-600)}
.hp-rg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:1rem 0}
.hp-rc{padding:1.5rem;border:1px solid var(--s200);border-radius:10px;transition:border-color .15s;text-decoration:none;display:block;color:inherit}
.hp-rc:hover{border-color:var(--teal-400)}
.hp-rc-i{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:.75rem}
.hp-rc-i svg{width:20px;height:20px}
.hp-rc h4{font-family:var(--hf);font-size:1rem;font-weight:600;margin-bottom:.3rem}
.hp-rc p{font-size:.82rem;color:var(--s400);line-height:1.5}
.hp-tl{position:relative;padding-left:34px;margin:1rem 0 1.5rem}
.hp-tl::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--teal-400) 0%,var(--teal-400) 50px,var(--s200) 50px);border-radius:2px}
.hp-tl-item{position:relative;padding:0 0 1.75rem 1.4rem}
.hp-tl-item:last-child{padding-bottom:0}
.hp-tl-item::before{content:'';position:absolute;left:-26px;top:8px;width:11px;height:11px;border-radius:50%;background:var(--s200);border:3px solid var(--s50);z-index:1}
.hp-tl-item.current::before{width:17px;height:17px;left:-29px;top:5px;background:var(--teal-400);border:4px solid var(--teal-50);box-shadow:0 0 0 5px rgba(29,158,117,0.15)}
@keyframes tl-pulse{0%,100%{box-shadow:0 0 0 5px rgba(29,158,117,0.15)}50%{box-shadow:0 0 0 12px rgba(29,158,117,0.05)}}
@media(prefers-reduced-motion:no-preference){.hp-tl-item.current::before{animation:tl-pulse 2.5s ease-in-out infinite}}
.hp-tl-d{font-family:var(--mf);font-size:.72rem;color:var(--s400)}
.hp-tl-item h4{font-size:.95rem;font-weight:600;margin:1px 0}
.hp-tl-o{font-size:.85rem;color:var(--s600)}
.hp-tl-desc{font-size:.82rem;color:var(--s400);margin-top:.25rem;line-height:1.5}
.hp-blog-card{padding:1.25rem 1.5rem;background:var(--s50);border-radius:10px;margin:.75rem 0;text-decoration:none;display:block;color:inherit;transition:box-shadow .15s}
.hp-blog-card:hover{box-shadow:0 0 0 1px var(--teal-400)}
.hp-blog-date{font-family:var(--mf);font-size:.68rem;color:var(--teal-600);margin-bottom:.3rem}
.hp-blog-card h4{font-family:var(--hf);font-size:1rem;font-weight:600;margin-bottom:.3rem;line-height:1.3}
.hp-blog-card p{font-size:.85rem;color:var(--s600);line-height:1.55}
.hp-blog-tags{display:flex;gap:5px;margin-top:.5rem}
.hp-blog-tags span{font-size:.65rem;padding:2px 8px;border-radius:4px;background:var(--teal-50);color:var(--teal-900)}
.hp-cta{text-align:center;padding:2rem 0 1rem}
.hp-cta .hp-sect{margin-bottom:.5rem}
.hp-cta-sub{font-size:.92rem;color:var(--s400);margin-bottom:1.5rem}
.hp-btn-p{font-size:.85rem;font-weight:500;padding:10px 24px;border-radius:100px;text-decoration:none;background:var(--teal-600);color:#fff!important;transition:background .2s;display:inline-block;margin-bottom:1rem}
.hp-btn-p:hover{background:var(--teal-800)}
@media(max-width:650px){.hp-hero-row{flex-direction:column;align-items:center;text-align:center}.hp-pills{justify-content:center}.hp-rg{grid-template-columns:1fr}}
</style>
{% endblock %}
